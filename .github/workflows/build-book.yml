name: Build Book (PDF + EPUB)

# Baut das Buch bei Push auf main, manuell (workflow_dispatch) und bei Version-Tags (vX.Y.Z → Release).
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write  # fuer Release-Erstellung bei Tags

concurrency:
  group: build-book-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Tests (stdlib unittest — keine Fremdabhaengigkeit)
        # Hartes Gate, ohne Toleranz: Jeder Test in tests/ ist ein Grabstein fuer einen realen
        # Fehler vom 16.07.2026. Faellt einer, faellt der Build — hier, sofort, laut.
        # Der Aura-Governor weiter unten misst dagegen Resonanz, nicht Einzeldefekte.
        run: python -m unittest discover -s tests -v

      - name: Werk kompilieren (frontmatter → chapters → backmatter)
        run: python build/build_book.py

      - name: Pandoc + XeLaTeX + Schriften installieren
        # lmodern ist NICHT optional: Pandocs LaTeX-Standardtemplate laedt `\usepackage{lmodern}`
        # unbedingt — auch unter XeLaTeX. Ohne das Paket bricht der PDF-Schritt mit
        # "! LaTeX Error: File `lmodern.sty' not found." und Exit 43 ab. Genau daran ist dieser
        # Build 91 Mal gestorben (13.–16.07.2026), waehrend das EPUB jedes Mal sauber durchlief.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc texlive-xetex texlive-fonts-recommended texlive-lang-german \
            fonts-noto-core lmodern

      - name: EPUB erzeugen (robust)
        run: |
          pandoc dist/compiled_book.md \
            --metadata-file=build/pandoc-metadata.yaml \
            --resource-path=.:build \
            --toc \
            -o "dist/BLACKBOOK-UNDERCOVER-Band1.epub"

      - name: PDF erzeugen (XeLaTeX)
        run: |
          pandoc dist/compiled_book.md \
            --metadata-file=build/pandoc-metadata.yaml \
            --resource-path=.:build \
            --toc \
            --pdf-engine=xelatex \
            -V mainfont="Noto Serif" \
            -o "dist/BLACKBOOK-UNDERCOVER-Band1.pdf"

      - name: Aura-Governor — Resonanz-Koeffizient R_t messen (Kap. VI)
        # Spezifiziert in chapters/06_dephora-aura.md: "Der PROJECTMANAGER berechnet den
        # Koeffizienten R_t vor jedem Release-Versuch." Auf normalen Pushes berichtet er nur —
        # das Gate steht dort, wo die Folge steht: beim Veroeffentlichen, nicht beim Entwurf.
        id: aura
        continue-on-error: true
        run: python build/aura_governor.py

      - name: Resonanz-Gate — blockiert den Release bei R_t < 0.90
        if: startsWith(github.ref, 'refs/tags/v') && steps.aura.outcome != 'success'
        run: |
          echo "::error::Resonanz-Divergenz (Kap. VI): R_t < 0.90. Der Release ist blockiert."
          exit 1

      - name: Artefakte hochladen (PDF · EPUB · Markdown)
        uses: actions/upload-artifact@v4
        with:
          name: blackbook-band1
          path: |
            dist/BLACKBOOK-UNDERCOVER-Band1.pdf
            dist/BLACKBOOK-UNDERCOVER-Band1.epub
            dist/compiled_book.md
          if-no-files-found: error
          retention-days: 90

      - name: Release veröffentlichen (nur bei Version-Tag vX.Y.Z)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "BLACKBOOK UNDERCOVER ${{ github.ref_name }}"
          files: |
            dist/BLACKBOOK-UNDERCOVER-Band1.pdf
            dist/BLACKBOOK-UNDERCOVER-Band1.epub
